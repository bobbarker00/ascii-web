<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font: 13px system-ui, sans-serif;
      width: 240px;
      margin: 0;
      padding: 14px;
      color: #1c1c1a;
      background: #faf9f5;
    }
    h1 { font-size: 14px; font-weight: 500; margin: 0 0 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; gap: 10px; }
    .row label { flex: 1; }
    input[type="range"] { width: 110px; }
    .val { width: 28px; text-align: right; color: #5f5e5a; font-variant-numeric: tabular-nums; }
    .hint { color: #888780; font-size: 11px; margin-top: 14px; line-height: 1.5; }
    .toggle { font-weight: 500; }
  </style>
</head>
<body>
  <h1>ASCII Web</h1>

  <div class="row toggle">
    <label for="enabled">Enabled</label>
    <input type="checkbox" id="enabled" />
  </div>

  <div class="row">
    <label for="cellSize">Cell size</label>
    <input type="range" id="cellSize" min="4" max="16" step="1" />
    <span class="val" id="cellSizeVal"></span>
  </div>

  <div class="row">
    <label for="edgeThreshold">Edge strength</label>
    <input type="range" id="edgeThreshold" min="0" max="0.3" step="0.01" />
    <span class="val" id="edgeThresholdVal"></span>
  </div>

  <div class="row">
    <label for="color">Colour</label>
    <input type="checkbox" id="color" />
  </div>

  <div class="row">
    <label for="textMode">Text mode (selectable)</label>
    <input type="checkbox" id="textMode" />
  </div>

  <p class="hint">Converts images and videos on the current tab. Lower cell size = finer detail (and heavier). Reload a page if media doesn't pick up.</p>

  <script src="popup.js"></script>
</body>
</html>
